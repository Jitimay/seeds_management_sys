name: imbuto
description: "Seeds Management System - Agricultural supply chain management for Burundi"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # HTTP & API
  dio: ^5.3.2
  retrofit: ^4.0.3
  json_annotation: ^4.9.0
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  
  # Navigation
  go_router: ^12.1.3
  
  # UI & Images
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  file_picker: ^8.0.0+1
  flutter_svg: ^2.0.9
  
  # Permissions & Device
  permission_handler: ^11.4.0
  connectivity_plus: ^5.0.2
  local_auth: ^2.3.0
  device_info_plus: ^9.1.2
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  path_provider: ^2.1.1
  get_it: ^7.6.4
  fluttertoast: ^8.2.5 # Added for toast messages
  
  # Icons
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  retrofit_generator: ^8.2.1
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
